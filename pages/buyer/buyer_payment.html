<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .payment-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 400px; }
        h2 { margin-top: 0; color: #1a1a1a; font-size: 1.5rem; text-align: center; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.85rem; font-weight: 600; color: #4b5563; margin-bottom: 8px; }
        input { width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 6px; box-sizing: border-box; font-size: 1rem; transition: border-color 0.2s; }
        input:focus { outline: none; border-color: #2563eb; ring: 2px solid #bfdbfe; }
        .row { display: flex; gap: 15px; }
        .row div { flex: 1; }
        .pay-btn { width: 100%; background-color: #2563eb; color: white; padding: 14px; border: none; border-radius: 6px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 10px; transition: background 0.2s; }
        .pay-btn:hover { background-color: #1d4ed8; }
        .security-badge { text-align: center; margin-top: 20px; font-size: 0.75rem; color: #9ca3af; }
    </style>
</head>
<body>

<div class="payment-card">
    <h2>Secure Payment</h2>
    <form action="/submit-payment" method="POST">
        
        <div class="form-group">
            <label for="card-name">Cardholder Name</label>
            <input type="text" id="card-name" name="card_name" placeholder="Jane Doe" required>
        </div>

        <div class="form-group">
            <label for="card-number">Card Number</label>
            <input type="text" id="card-number" name="card_number" placeholder="0000 0000 0000 0000" maxlength="16" required>
        </div>

        <div class="row">
            <div class="form-group">
                <label for="expiry">Expiration Date</label>
                <input type="text" id="expiry" name="expiry" placeholder="MM/YY" maxlength="5" required>
            </div>
            <div class="form-group">
                <label for="cvv">CVV</label>
                <input type="text" id="cvv" name="cvv" placeholder="123" maxlength="4" required>
            </div>
        </div>

        <button type="submit" class="pay-btn">Pay Now</button>
        
        <div class="security-badge">
            🔒 Encrypted & Secure Payment
        </div>
    </form>
</div>

</body>
</html>
