<!DOCTYPE html>
<html lang="en">
<head>
    <title> Manage Profile</title>
</head>
<body style="font-family: 'Times New Roman', serif; font-size: 11px;">

    <h1 style="font-size: 24px; font-weight: bold;">Manage Profile</h1>

    <h2 style="font-size: 18px; font-weight: bold; font-style: italic;">Edit Account Information</h2>

    <form action="/update-profile" method="POST">
        <p>
            <label>First Name:</label><br>
            <input type="text" name="first_name" value="">
        </p>
        
        <p>
            <label>Last Name:</label><br>
            <input type="text" name="last_name" value="">
        </p>

        <p>
            <label>Email Address:</label><br>
            <input type="email" name="email" value="">
        </p>

        <button type="submit" style="font-weight: bold; font-style: italic;">Save Changes</button>
    </form>

</body>
</html>
