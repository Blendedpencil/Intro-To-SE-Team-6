<!DOCTYPE html>
<html lang="en">
<head>
    <title>Buyer Dashboard</title>
</head>
<body style="font-family: 'Times New Roman', serif; padding: 20px;">
    <nav style="font-size: 16px; margin-bottom: 20px;">
        <strong>HomeZapp</strong> |
        <a href="{% url 'homepage' %}">Homepage</a> |
        <a href="{% url 'wishlist_page' %}">Cart</a> |
        <a href="{% url 'notifications_page' %}">Notifications</a> |
        <a href="{% url 'buyer_manageprofile' %}">Profile</a> |
        <a href="{% url 'logoutPage' %}">Logout</a>
    </nav>

    <h1>Buyer Dashboard</h1>

    <form method="get" action="{% url 'buyer_page' %}">
        <input type="text" name="search" value="{{ search }}" placeholder="Search listing title, style, or location..." style="padding: 10px; width: 400px; margin-bottom: 20px;">
        <button type="submit">Search</button>
    </form>

    <section style="display: flex; flex-wrap: wrap; gap: 20px;">
        {% for listing in listings %}
            <div style="border: 1px solid #ccc; width: 280px; padding: 10px; box-shadow: 2px 2px 8px #ddd; border-radius: 8px;">
                {% if listing.image %}
                    <img src="{{ listing.image.url }}" style="width: 100%; height: 180px; object-fit: cover; border-radius: 5px;">
                {% endif %}
                <h3>{{ listing.title }}</h3>
                <p><strong>{{ listing.style }}</strong> - ${{ listing.price }}</p>
                <p>{{ listing.location }}</p>
                <a href="{% url 'listing_details' listing.id %}" style="text-decoration: none; color: #007bff; font-weight: bold;">View Details</a>
            </div>
        {% empty %}
            <p>No listings found.</p>
        {% endfor %}
    </section>
</body>
</html>
