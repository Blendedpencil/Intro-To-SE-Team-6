{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Property Details</title>
</head>
<body style="font-family: 'Times New Roman', serif; padding: 20px;">
    <nav style="margin-bottom: 20px;">
        <a href="{% url 'buyer_page' %}">← Back to Search</a> |
        <a href="{% url 'wishlist_page' %}">Cart (<span id="cart-count">0</span>)</a>
    </nav>
    
    <h1 id="title">Loading...</h1>
    <img id="main-img" style="width: 100%; max-width: 800px; height: auto; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.2);">
    
    <section style="margin-top: 20px;">
        <p id="price" style="font-size: 22px; color: #28a745; font-weight: bold; margin: 5px 0;"></p>
        <p id="loc" style="font-size: 16px; color: #555;"></p>
        <p id="style" style="font-style: italic;"></p>
        <p id="desc" style="max-width: 700px; line-height: 1.6;"></p>
    </section>

    <button id="saveBtn" style="background-color: #007bff; color: white; border: none; padding: 12px 25px; cursor: pointer; border-radius: 5px; font-size: 16px; margin-top: 20px;">Add to Cart / Wishlist</button>

    <script src="{% static 'listings/js/data.js' %}"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const houseId = params.get('id');
        const house = houses.find(h => h.id == houseId);

        if (house) {
            document.getElementById('title').innerText = house.title;
            document.getElementById('main-img').src = house.image;
            document.getElementById('price').innerText = house.price;
            document.getElementById('loc').innerText = "Location: " + house.location;
            document.getElementById('style').innerText = "Architectural Style: " + house.style;
            document.getElementById('desc').innerText = house.desc;

            document.getElementById('saveBtn').onclick = function() {
                let cart = JSON.parse(localStorage.getItem('homeZappCart')) || [];
                if (!cart.some(item => item.id === house.id)) {
                    cart.push(house);
                    localStorage.setItem('homeZappCart', JSON.stringify(cart));
                    alert("Property added to your cart!");
                    updateCartUI();
                } else {
                    alert("This property is already in your cart.");
                }
            };
        }
    </script>
</body>
</html>
