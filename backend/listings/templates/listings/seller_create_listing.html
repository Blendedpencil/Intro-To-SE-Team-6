<!DOCTYPE html>
<html>
<head>
    <title>Create Listing</title>
</head>
<body>

<h1>Create Listing</h1>

<section>
<h2>Listing Info</h2>

{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}

{% if success %}
<p style="color:green;">{{ success }}</p>
{% endif %}

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}

    <input type="text" name="title" placeholder="Property Title">
    <br><br>

    <input type="number" step="0.01" name="price" placeholder="Price">
    <br><br>

    <input type="text" name="location" placeholder="Location (City, State)">
    <br><br>

    <input type="text" name="style" placeholder="Style (Modern, etc.)">
    <br><br>

    <input type="number" name="bedrooms" placeholder="Bedrooms">
    <br><br>

    <input type="number" name="bathrooms" placeholder="Bathrooms">
    <br><br>

    <input type="number" name="square_footage" placeholder="Square Footage">
    <br><br>

    <textarea name="description" placeholder="Description"></textarea>
    <br><br>

    <input type="file" name="image" accept=".png,.jpg,.jpeg,image/png,image/jpeg">
    <br><br>

    <button type="submit">Create Listing</button>
</form>
</section>

<hr>

<p>
    <a href="{% url 'seller_dashboard' %}">Back</a>
</p>

</body>
</html>
