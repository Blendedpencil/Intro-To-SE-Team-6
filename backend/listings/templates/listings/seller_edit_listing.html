<!DOCTYPE html>
<html>
<head>
    <title>Edit Listing</title>
</head>
<body>

<h1>Edit Listing</h1>

{% if success %}
<p style="color:green;">{{ success }}</p>
{% endif %}

<section>
    <h2>Choose Listing</h2>

    <form method="get">
        <select name="listing_id">
            <option value="">Select a listing</option>
            {% for listing in listings %}
                <option value="{{ listing.id }}" {% if selected_listing and listing.id == selected_listing.id %}selected{% endif %}>
                    {{ listing.title }}
                </option>
            {% endfor %}
        </select>

        <button type="submit">Load</button>
    </form>
</section>

{% if selected_listing %}
<section>
    <h2>Update Details</h2>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <input type="hidden" name="listing_id" value="{{ selected_listing.id }}">

        <label>Title</label><br>
        <input type="text" name="title" value="{{ selected_listing.title }}"><br><br>

        <label>Price</label><br>
        <input type="number" step="0.01" name="price" value="{{ selected_listing.price }}"><br><br>

        <label>Location</label><br>
        <input type="text" name="location" value="{{ selected_listing.location }}"><br><br>

        <label>Style</label><br>
        <input type="text" name="style" value="{{ selected_listing.style }}"><br><br>

        <label>Bedrooms</label><br>
        <input type="number" name="bedrooms" value="{{ selected_listing.bedrooms }}"><br><br>

        <label>Bathrooms</label><br>
        <input type="number" name="bathrooms" value="{{ selected_listing.bathrooms }}"><br><br>

        <label>Square Footage</label><br>
        <input type="number" name="square_footage" value="{{ selected_listing.square_footage }}"><br><br>

        <label>Description</label><br>
        <textarea name="description">{{ selected_listing.description }}</textarea><br><br>

        <label>Replace Image</label><br>
        <input type="file" name="image"><br><br>

        <button type="submit">Save Changes</button>
        <a href="{% url 'seller_dashboard' %}">Cancel</a>
    </form>
</section>
{% endif %}

<p><a href="{% url 'seller_dashboard' %}">Back to Dashboard</a></p>

</body>
</html>
