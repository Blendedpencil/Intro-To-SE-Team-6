<!DOCTYPE html>
<html>
<head>
    <title>Seller Login</title>
</head>
<body>
    <h1>Seller Login</h1>

    {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <p>
            <label>Email:</label><br>
            <input type="text" name="email">
        </p>
        <p>
            <label>Password:</label><br>
            <input type="password" name="password">
        </p>
        <button type="submit">Login</button>
    </form>
</body>
</html>
