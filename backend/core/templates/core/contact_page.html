<!DOCTYPE html>
<html lang="en">
<head>
    <title>HomeZapp - Contact Us</title>
</head>
<body style="font-family: 'Times New Roman', serif; font-size: 11px;">
    <div class="navbarZap">
        <nav>
        <h2><a href="{% url 'homepage' %}">HomeZapp</a></h2>
        <div>
            
            <a href="{% url 'contact_page' %}">Contact</a>
            
        </div>
        </nav>
    </div>

    <h1 style="font-size: 24px; font-weight: bold;">Contact Us</h1>

    <h2 style="font-size: 18px; font-weight: bold; font-style: italic;">Get in Touch</h2>

    <p>Have questions about HomeZapp? Use the form below to contact our administration team</p>

    <form action="/submit-contact" method="POST">
        <p>
            <label>Name:</label><br>
            <input type="text" name="user_name" required>
        </p>

        <p>
            <label>Email Address:</label><br>
            <input type="email" name="user_email" required>
        </p>

        <p>
            <label>Subject:</label><br>
            <select name="subject">
                <option value="general">General Inquiry</option>
                <option value="technical">Technical Support</option>
                <option value="billing">Billing/Payments</option>
                <option value="other">Other</option>
            </select>
        </p>

        <p>
            <label>Message:</label><br>
            <textarea name="message" rows="5" cols="40" required></textarea>
        </p>

        <button type="submit" style="font-weight: bold; font-style: italic;">
            Send Message
        </button>
    </form>

    <hr>
    
    <h3 style="font-size: 13px; font-weight: bold; font-style: italic;">Our Office</h3>
    <p>
        HomeZapp HQ<br>
        Developed by Group 8 <br>
        123 Reality Lane<br>
        Project Version: 1.0 
    </p>

</body>
</html>
