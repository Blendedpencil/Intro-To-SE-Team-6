<!DOCTYPE html>
<html>
<head>
    <title>Buyer Application Form</title>
</head>
<body style="font-family: 'Times New Roman', serif; padding: 20px;">
    <h1>Buyer Application Form</h1>

    <p><strong>Property:</strong> {{ listing.title }}</p>
    <p><strong>Location:</strong> {{ listing.location }}</p>
    <p><strong>Price:</strong> ${{ listing.price }}</p>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <label for="fname">First name:</label><br>
        <input type="text" id="fname" name="fname"><br><br>

        <label for="lname">Last name:</label><br>
        <input type="text" id="lname" name="lname"><br><br>

        <label for="emailID">Email ID:</label><br>
        <input type="text" id="emailID" name="emailID"><br><br>

        <div>
            <label for="gov-id">Government Issued ID:</label><br>
            <input type="file" id="gov-id" name="gov_id" accept="image/*,.pdf" required>
        </div>

        <br>

        <div>
            <label for="mortgage-docs">Mortgage Pre-approval Documents:</label><br>
            <input type="file" id="mortgage-docs" name="mortgage_pre_approval" accept=".pdf,.doc,.docx" required>
        </div>

        <br>

        <div>
            <label for="bank-statements">Bank Statements (Last 3 Months):</label><br>
            <input type="file" id="bank-statements" name="bank_statements" multiple accept=".pdf">
            <small>You can select multiple files at once.</small>
        </div>

        <br>

        <button type="submit">Submit Application</button>
    </form>

    <p><a href="{% url 'wishlist_page' %}">Back to Cart</a></p>
</body>
</html>
