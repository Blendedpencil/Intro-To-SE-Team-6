<!DOCTYPE html>
<html>
<head>
<title>Create Listing</title>
</head>

<body>

<h1>Create Listing</h1>

<section>

<h2>Listing Info</h2>

<input type="text" id="title" placeholder="Property Title">
<br><br>

<input type="number" id="price" placeholder="Price">
<br><br>

<input type="text" id="location" placeholder="Location (City, State)">
<br><br>

<input type="text" id="style" placeholder="Style (Modern, etc.)">
<br><br>

<textarea id="description" placeholder="Description"></textarea>
<br><br>

<button onclick="createListing()">Create Listing</button>

<p id="message"></p>

</section>

<hr>

<p>
<a href="seller_dashboard.html">Back to Dashboard</a>
</p>

<script>

function getListings() {
    let data = localStorage.getItem("listings");
    if (data) {
        return JSON.parse(data);
    } else {
        return [];
    }
}

function saveListings(list) {
    localStorage.setItem("listings", JSON.stringify(list));
}

function createListing() {
    let title = document.getElementById("title").value;
    let price = document.getElementById("price").value;
    let location = document.getElementById("location").value;
    let style = document.getElementById("style").value;
    let description = document.getElementById("description").value;

    let message = document.getElementById("message");

    if (title == "" || price == "" || location == "" || description == "") {
        message.innerText = "Fill in all required fields";
        return;
    }

    if (price <= 0) {
        message.innerText = "Enter a valid price";
        return;
    }

    let listings = getListings();

    let newItem = {
        id: Date.now(),
        title: title,
        price: price,
        location: location,
        style: style,
        description: description
    };

    listings.push(newItem);
    saveListings(listings);

    message.innerText = "Listing created";

    setTimeout(function() {
        window.location.href = "seller_dashboard.html";
    }, 1000);
}

</script>

</body>
</html>
