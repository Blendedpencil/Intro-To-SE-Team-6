<!DOCTYPE html>
<html>

<head>
<title>Seller Dashboard</title>
</head>

<body onload="loadListings()">

<h1>Seller Dashboard</h1>

<nav>
<a href="#">Home</a>
<a href="#">Listings</a>
<a href="#">Inbox</a>
<a href="#">Logout</a>
</nav>

<hr>

<h2>Add New Listing</h2>

<section>

<label>Title</label><br>
<input type="text" id="title"><br><br>

<label>Price</label><br>
<input type="number" id="price"><br><br>

<label>Location</label><br>
<input type="text" id="location"><br><br>

<label>Description</label><br>
<textarea id="description"></textarea><br><br>

<button onclick="addListing()">Add Listing</button>

<p id="message"></p>

</section>

<hr>

<h2>Current Listings</h2>

<section id="listings">
<p>No listings available.</p>
</section>

<script>

function getListings() {
    let data = localStorage.getItem("listings");
    if (data) {
        return JSON.parse(data);
    } else {
        return [];
    }
}

function saveListings(list) {
    localStorage.setItem("listings", JSON.stringify(list));
}

function addListing() {
    let title = document.getElementById("title").value;
    let price = document.getElementById("price").value;
    let location = document.getElementById("location").value;
    let description = document.getElementById("description").value;
    let message = document.getElementById("message");

    if (title == "" || price == "" || location == "" || description == "") {
        message.innerText = "Fill in all fields";
        return;
    }

    if (price <= 0) {
        message.innerText = "Enter a valid price";
        return;
    }

    let listings = getListings();

    let newItem = {
        id: Date.now(),
        title: title,
        price: price,
        location: location,
        description: description
    };

    listings.push(newItem);
    saveListings(listings);

    document.getElementById("title").value = "";
    document.getElementById("price").value = "";
    document.getElementById("location").value = "";
    document.getElementById("description").value = "";

    message.innerText = "Listing added";

    loadListings();
}

function loadListings() {
    let listings = getListings();
    let section = document.getElementById("listings");

    if (listings.length == 0) {
        section.innerHTML = "<p>No listings available.</p>";
        return;
    }

    let output = "";

    for (let i = 0; i < listings.length; i++) {
        output += "<div style='border:1px solid black; margin:10px; padding:10px'>";
        output += "<h3>" + listings[i].title + "</h3>";
        output += "<p>Price: $" + listings[i].price + "</p>";
        output += "<p>Location: " + listings[i].location + "</p>";
        output += "<p>" + listings[i].description + "</p>";
        output += "<button onclick='deleteListing(" + listings[i].id + ")'>Delete</button>";
        output += "</div>";
    }

    section.innerHTML = output;
}

function deleteListing(id) {
    let listings = getListings();

    listings = listings.filter(function(item) {
        return item.id != id;
    });

    saveListings(listings);
    loadListings();
}

</script>

</body>
</html>
